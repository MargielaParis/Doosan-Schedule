name: Update KBO Schedule

on:
  schedule:
    - cron: '0 15 * * 0'   # UTC 일요일 15:00 = KST 월요일 00:00
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run crawler
        run: python kbo_crawler.py

      - name: Commit & Push schedule.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --cached --quiet || git commit -m "chore: update schedule $(date +'%Y-%m-%d')"
          git push
